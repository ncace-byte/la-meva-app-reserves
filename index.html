<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Confirmada</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Finalitza la teva reserva</h1>
        
        <input type="text" id="nom" placeholder="El teu nom" 
            class="w-full p-3 border-2 border-blue-100 rounded-lg mb-4 outline-none focus:border-blue-500">

        <select id="espai" class="w-full p-3 border-2 border-blue-100 rounded-lg mb-6">
            <option value="Gimnàs">🏀 Gimnàs</option>
            <option value="Biblioteca">📚 Biblioteca</option>
            <option value="Laboratori">🧪 Laboratori</option>
        </select>

        <a id="btn-google" 
           href="#" 
           target="_blank"
           class="block w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-600 transition-transform active:scale-95 shadow-md">
           ANAR AL CALENDARI 🗓️
        </a>
    </div>

    <script>
        const inputNom = document.getElementById('nom');
        const selectEspai = document.getElementById('espai');
        const boto = document.getElementById('btn-google');

        function generarUrl() {
            const titol = "Reserva: " + selectEspai.value;
            const descripcio = "Reserva feta per l'alumne: " + inputNom.value;
            
            // Atenció a l'ordre: action=TEMPLATE és obligatori!
            // text = Títol de l'esdeveniment
            // details = Descripció
            const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(titol)}&details=${encodeURIComponent(descripcio)}&sf=true&output=xml`;
            
            boto.href = url;
        }

        // Escoltem els canvis
        inputNom.addEventListener('input', generarUrl);
        selectEspai.addEventListener('change', generarUrl);
        
        // Inicialitzem
        generarUrl();
    </script>
</body>
</html>
