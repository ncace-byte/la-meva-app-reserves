<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Ràpida</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-6 rounded-xl shadow-lg w-80 text-center">
        <h2 class="text-xl font-bold mb-4">Reserva l'Espai</h2>
        
        <input type="text" id="nom" placeholder="El teu nom" 
            class="w-full p-2 border rounded mb-4 outline-none focus:border-blue-500">

        <select id="espai" class="w-full p-2 border rounded mb-6">
            <option value="Gimnàs">🏀 Gimnàs</option>
            <option value="Biblioteca">📚 Biblioteca</option>
        </select>

        <a id="meuBoto" 
           href="https://www.google.com/calendar/render?action=TEMPLATE&text=Reserva" 
           target="_blank"
           class="block w-full bg-blue-600 text-white py-3 rounded-lg font-bold">
           CONFIRMAR ARA
        </a>
    </div>

    <script>
        const inputNom = document.getElementById('nom');
        const selectEspai = document.getElementById('espai');
        const enllac = document.getElementById('meuBoto');

        function actualitza() {
            const textReserva = "Reserva " + selectEspai.value;
            const detalls = "Alumne: " + inputNom.value;
            
            // Construïm la URL i la posem DIRECTAMENT al botó
            enllac.href = "https://www.google.com/calendar/render?action=TEMPLATE&text=" 
                          + encodeURIComponent(textReserva) 
                          + "&details=" + encodeURIComponent(detalls);
        }

        // Cada vegada que l'usuari toqui res, la URL canvia a l'instant
        inputNom.addEventListener('input', actualitza);
        selectEspai.addEventListener('change', actualitza);
        
        // Executem un cop al principi
        actualitza();
    </script>
</body>
</html>
